let currentQuote = null;

function getRandomQuote() {
  let q;
  do { q = quotes[Math.floor(Math.random() * quotes.length)]; }
  while (q === currentQuote && quotes.length > 1);
  return q;
}

const quoteBox = document.getElementById('quoteBox');
const quoteText = document.getElementById('quoteText');
const authorText = document.getElementById('authorText');
const generateBtn = document.getElementById('generateBtn');

function showNewQuote() {
  const { text, author } = getRandomQuote();
  currentQuote = { text, author };
  
  quoteBox.classList.remove('visible');
  setTimeout(() => {
    quoteText.textContent = text;
    authorText.textContent = author ? `— ${author}` : '';
    quoteBox.classList.add('visible');
  }, 320);
}

// First quote on load
setTimeout(showNewQuote, 400);
generateBtn.addEventListener('click', showNewQuote);

// Keyboard shortcut
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    showNewQuote();
  }
});

// Share — only the quote text, no links
document.getElementById('shareX').addEventListener('click', () => {
  if (!currentQuote) return;
  const txt = currentQuote.author
    ? `"${currentQuote.text}" — ${currentQuote.author}`
    : `"${currentQuote.text}"`;
  window.open('https://x.com/intent/tweet?text=' + encodeURIComponent(txt), '_blank');
});

document.getElementById('shareTg').addEventListener('click', () => {
  if (!currentQuote) return;
  const txt = currentQuote.author
    ? `"${currentQuote.text}"\n— ${currentQuote.author}`
    : `"${currentQuote.text}"`;
  window.open('https://t.me/share/url?url=&text=' + encodeURIComponent(txt), '_blank');
});

document.getElementById("saveBtn").addEventListener("click", () => {

  const size = 1080;
  const canvas = document.createElement("canvas");
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext("2d");

  // Beautiful gradient backgrounds
  const gradients = [
    ["#667eea","#764ba2"],
    ["#ff9966","#ff5e62"],
    ["#56ccf2","#2f80ed"],
    ["#11998e","#38ef7d"],
    ["#c471f5","#fa71cd"],
    ["#f7971e","#ffd200"]
  ];

  const g = gradients[Math.floor(Math.random()*gradients.length)];

  const gradient = ctx.createLinearGradient(0,0,size,size);
  gradient.addColorStop(0,g[0]);
  gradient.addColorStop(1,g[1]);

  ctx.fillStyle = gradient;
  ctx.fillRect(0,0,size,size);

  const quote = document.getElementById("quoteText").textContent;
  const author = document.getElementById("authorText").textContent;

  ctx.fillStyle = "#ffffff";
  ctx.textAlign = "center";

  ctx.font = "bold 60px Playfair Display, serif";

  const maxWidth = 820;
  const lineHeight = 72;

  function wrapText(text){
    const words = text.split(" ");
    let line="";
    const lines=[];

    for(let n=0;n<words.length;n++){
      const testLine=line+words[n]+" ";
      const metrics=ctx.measureText(testLine);
      const testWidth=metrics.width;

      if(testWidth>maxWidth && n>0){
        lines.push(line);
        line=words[n]+" ";
      }else{
        line=testLine;
      }
    }
    lines.push(line);
    return lines;
  }

  const lines = wrapText(quote);

  const totalTextHeight = lines.length * lineHeight + 100;
  let y = (size - totalTextHeight) / 2;

  lines.forEach(line=>{
    ctx.fillText(line.trim(), size/2, y);
    y += lineHeight;
  });

  ctx.font = "40px Plus Jakarta Sans, sans-serif";
  ctx.globalAlpha = 0.9;

  if(author){
    ctx.fillText(author, size/2, y + 40);
  }

  
  const link=document.createElement("a");
  link.download="quote.png";
  link.href=canvas.toDataURL("image/png");
  link.click();

});
