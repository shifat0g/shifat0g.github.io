  { arabic: "وَتَعَاوَنُوا عَلَى الْبِرِّ وَالتَّقْوَىٰ", text: "And cooperate in righteousness and piety.", author: "Surah Al-Ma'idah (5:2)", source: "Quran" },
  { arabic: "يَا أَيُّهَا الَّذِينَ آمَنُوا اسْتَعِينُوا بِالصَّبْرِ وَالصَّلَاةِ", text: "O you who have believed, seek help through patience and prayer.", author: "Surah Al-Baqarah (2:153)", source: "Quran" },
  { arabic: "وَمَن يَتَّقِ اللَّهَ يَجْعَل لَّهُ مَخْرَجًا", text: "And whoever fears Allah — He will make for him a way out.", author: "Surah At-Talaq (65:2)", source: "Quran" },
  { arabic: "وَيَرْزُقْهُ مِنْ حَيْثُ لَا يَحْتَسِبُ", text: "And will provide for him from where he does not expect.", author: "Surah At-Talaq (65:3)", source: "Quran" },
  { arabic: "إِنَّ اللَّهَ لَا يُضِيعُ أَجْرَ الْمُحْسِنِينَ", text: "Indeed, Allah does not allow to be lost the reward of those who do good.", author: "Surah At-Tawbah (9:120)", source: "Quran" },
  { arabic: "وَأَن لَّيْسَ لِلْإِنسَانِ إِلَّا مَا سَعَىٰ", text: "And that there is not for man except that for which he strives.", author: "Surah An-Najm (53:39)", source: "Quran" },
  { arabic: "رَبِّ إِنِّي لِمَا أَنزَلْتَ إِلَيَّ مِنْ خَيْرٍ فَقِيرٌ", text: "My Lord, indeed I am in need of whatever good You would send down to me.", author: "Surah Al-Qasas (28:24)", source: "Quran" },
  { arabic: "وَفَوْقَ كُلِّ ذِي عِلْمٍ عَلِيمٌ", text: "And above every possessor of knowledge is one more knowing.", author: "Surah Yusuf (12:76)", source: "Quran" },
  { arabic: "لَا يُكَلِّفُ اللَّهُ نَفْسًا إِلَّا وُسْعَهَا", text: "Allah does not burden a soul beyond that it can bear.", author: "Surah Al-Baqarah (2:286)", source: "Quran" },
  { arabic: "إِنَّهُ كَانَ بِعِبَادِهِ خَبِيرًا بَصِيرًا", text: "Indeed, He is ever, of His servants, Acquainted and Seeing.", author: "Surah Al-Isra (17:96)", source: "Quran" },
  { arabic: "وَاللَّهُ غَالِبٌ عَلَىٰ أَمْرِهِ", text: "And Allah is predominant over His affair.", author: "Surah Yusuf (12:21)", source: "Quran" },
  { arabic: "إِنَّا لِلَّهِ وَإِنَّا إِلَيْهِ رَاجِعُونَ", text: "Indeed we belong to Allah, and indeed to Him we will return.", author: "Surah Al-Baqarah (2:156)", source: "Quran" },
  { arabic: "وَلَا تَقْنَطُوا مِن رَّحْمَةِ اللَّهِ", text: "And do not despair of the mercy of Allah.", author: "Surah Az-Zumar (39:53)", source: "Quran" },
  { arabic: "إِنَّ اللَّهَ يُحِبُّ الْمُتَوَكِّلِينَ", text: "Indeed, Allah loves those who rely upon Him.", author: "Surah Al-Imran (3:159)", source: "Quran" },
  { arabic: "وَمَا بِكُم مِّن نِّعْمَةٍ فَمِنَ اللَّهِ", text: "And whatever you have of favor — it is from Allah.", author: "Surah An-Nahl (16:53)", source: "Quran" },
  { arabic: "لَئِن شَكَرْتُمْ لَأَزِيدَنَّكُمْ", text: "If you are grateful, I will surely increase you in favor.", author: "Surah Ibrahim (14:7)", source: "Quran" },
  { arabic: "وَاللَّهُ خَيْرُ الرَّازِقِينَ", text: "And Allah is the best of providers.", author: "Surah Al-Jumu'ah (62:11)", source: "Quran" },
  { arabic: "وَاللَّهُ خَيْرُ الْحَافِظِينَ", text: "And Allah is the best guardian.", author: "Surah Yusuf (12:64)", source: "Quran" },
  { arabic: "إِنَّ الْأَرْضَ لِلَّهِ يُورِثُهَا مَن يَشَاءُ مِنْ عِبَادِهِ", text: "Indeed, the earth belongs to Allah. He causes to inherit it whom He wills of His servants.", author: "Surah Al-A'raf (7:128)", source: "Quran" },
  { arabic: "وَعَلَى اللَّهِ فَلْيَتَوَكَّلِ الْمُؤْمِنُونَ", text: "And upon Allah let the believers rely.", author: "Surah Al-Imran (3:122)", source: "Quran" },
  { arabic: "رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً وَفِي الْآخِرَةِ حَسَنَةً", text: "Our Lord, give us in this world that which is good and in the Hereafter that which is good.", author: "Surah Al-Baqarah (2:201)", source: "Quran" },
  { arabic: "هُوَ الَّذِي يُصَلِّي عَلَيْكُمْ وَمَلَائِكَتُهُ", text: "It is He who confers blessing upon you, and His angels, that He may bring you out from darkness into the light.", author: "Surah Al-Ahzab (33:43)", source: "Quran" },
  { arabic: "وَقُل رَّبِّ اغْفِرْ وَارْحَمْ وَأَنتَ خَيْرُ الرَّاحِمِينَ", text: "And say: My Lord, forgive and have mercy, and You are the best of the merciful.", author: "Surah Al-Mu'minun (23:118)", source: "Quran" },
  { arabic: "إِنَّ رَبَّكَ لَبِالْمِرْصَادِ", text: "Indeed, your Lord is in observation.", author: "Surah Al-Fajr (89:14)", source: "Quran" },
  { arabic: "وَاللَّهُ يَعْلَمُ وَأَنتُمْ لَا تَعْلَمُونَ", text: "And Allah knows and you do not know.", author: "Surah Al-Baqarah (2:216)", source: "Quran" },
  { arabic: "يَعْلَمُ مَا فِي السَّمَاوَاتِ وَالْأَرْضِ", text: "He knows what is in the heavens and the earth.", author: "Surah Al-Mujadila (58:7)", source: "Quran" },
  { arabic: "وَمَا تَدْرِي نَفْسٌ مَّاذَا تَكْسِبُ غَدًا", text: "And no soul perceives what it will earn tomorrow.", author: "Surah Luqman (31:34)", source: "Quran" },
  { arabic: "كُلُّ نَفْسٍ ذَائِقَةُ الْمَوْتِ", text: "Every soul will taste death.", author: "Surah Al-Imran (3:185)", source: "Quran" },
  { arabic: "وَمَا الْحَيَاةُ الدُّنْيَا إِلَّا مَتَاعُ الْغُرُورِ", text: "And what is the worldly life except the enjoyment of delusion.", author: "Surah Al-Imran (3:185)", source: "Quran" },
  { arabic: "يَا أَيُّهَا النَّاسُ إِنَّ وَعْدَ اللَّهِ حَقٌّ", text: "O mankind, indeed the promise of Allah is truth.", author: "Surah Fatir (35:5)", source: "Quran" },
  { arabic: "إِنَّ اللَّهَ يُحِبُّ الْمُحْسِنِينَ", text: "Indeed, Allah loves the doers of good.", author: "Surah Al-Baqarah (2:195)", source: "Quran" },
  { arabic: "وَاللَّهُ يُحِبُّ الْمُطَّهِّرِينَ", text: "And Allah loves those who purify themselves.", author: "Surah At-Tawbah (9:108)", source: "Quran" },
  { arabic: "وَلَذِكْرُ اللَّهِ أَكْبَرُ", text: "And the remembrance of Allah is greater.", author: "Surah Al-Ankabut (29:45)", source: "Quran" },
  { arabic: "وَمَن يَتَوَكَّلْ عَلَى اللَّهِ فَهُوَ حَسْبُهُ", text: "And whoever relies upon Allah — then He is sufficient for him.", author: "Surah At-Talaq (65:3)", source: "Quran" },
  { arabic: "إِنَّ اللَّهَ يُحِبُّ التَّوَّابِينَ", text: "Indeed, Allah loves those who are constantly repentant.", author: "Surah Al-Baqarah (2:222)", source: "Quran" },
  { arabic: "وَالْعَاقِبَةُ لِلْمُتَّقِينَ", text: "And the best outcome is for the righteous.", author: "Surah Al-A'raf (7:128)", source: "Quran" },
  { arabic: "وَاللَّهُ سَمِيعٌ عَلِيمٌ", text: "And Allah is Hearing and Knowing.", author: "Surah Al-Baqarah (2:227)", source: "Quran" },
  { arabic: "إِنَّمَا يُوَفَّى الصَّابِرُونَ أَجْرَهُم بِغَيْرِ حِسَابٍ", text: "Indeed, the patient will be given their reward without account.", author: "Surah Az-Zumar (39:10)", source: "Quran" },
  { arabic: "وَمَا أَرْسَلْنَاكَ إِلَّا رَحْمَةً لِّلْعَالَمِينَ", text: "And We have not sent you except as a mercy to the worlds.", author: "Surah Al-Anbiya (21:107)", source: "Quran" },
  { arabic: "قُلْ إِنَّ صَلَاتِي وَنُسُكِي وَمَحْيَايَ وَمَمَاتِي لِلَّهِ رَبِّ الْعَالَمِينَ", text: "Say: Indeed, my prayer, my rites of sacrifice, my living and my dying are for Allah, Lord of the worlds.", author: "Surah Al-An'am (6:162)", source: "Quran" },
  { arabic: "فَأَيْنَمَا تُوَلُّوا فَثَمَّ وَجْهُ اللَّهِ", text: "So wherever you turn, there is the Face of Allah.", author: "Surah Al-Baqarah (2:115)", source: "Quran" },
  { arabic: "وَهُوَ الْقَاهِرُ فَوْقَ عِبَادِهِ", text: "And He is the subjugator over His servants.", author: "Surah Al-An'am (6:18)", source: "Quran" },
  { arabic: "وَمَن يُهِنِ اللَّهُ فَمَا لَهُ مِن مُّكْرِمٍ", text: "And whoever Allah humiliates — for him there is no bestower of honor.", author: "Surah Al-Hajj (22:18)", source: "Quran" },
  { arabic: "يُرِيدُ اللَّهُ بِكُمُ الْيُسْرَ وَلَا يُرِيدُ بِكُمُ الْعُسْرَ", text: "Allah intends for you ease and does not intend for you hardship.", author: "Surah Al-Baqarah (2:185)", source: "Quran" },
  { arabic: "وَأَحْسِن كَمَا أَحْسَنَ اللَّهُ إِلَيْكَ", text: "And do good as Allah has done good to you.", author: "Surah Al-Qasas (28:77)", source: "Quran" },
  { arabic: "وَلَا تَنسَ نَصِيبَكَ مِنَ الدُّنْيَا", text: "And do not forget your share of the world.", author: "Surah Al-Qasas (28:77)", source: "Quran" },
  { arabic: "وَبَشِّرِ الصَّابِرِينَ", text: "And give good tidings to the patient.", author: "Surah Al-Baqarah (2:155)", source: "Quran" },
  { arabic: "الَّذِينَ إِذَا أَصَابَتْهُم مُّصِيبَةٌ قَالُوا إِنَّا لِلَّهِ وَإِنَّا إِلَيْهِ رَاجِعُونَ", text: "Who, when disaster strikes them, say: Indeed we belong to Allah, and indeed to Him we will return.", author: "Surah Al-Baqarah (2:156)", source: "Quran" },
  { arabic: "ادْعُونِي أَسْتَجِبْ لَكُمْ", text: "Call upon Me; I will respond to you.", author: "Surah Ghafir (40:60)", source: "Quran" },
  { arabic: "إِن تَنصُرُوا اللَّهَ يَنصُرْكُمْ", text: "If you support Allah, He will support you.", author: "Surah Muhammad (47:7)", source: "Quran" },
  { arabic: "وَاللَّهُ أَعْلَمُ بِأَعْدَائِكُمْ", text: "And Allah is most knowing of your enemies.", author: "Surah An-Nisa (4:45)", source: "Quran" },
  { arabic: "وَهُوَ عَلَىٰ كُلِّ شَيْءٍ قَدِيرٌ", text: "And He is over all things competent.", author: "Surah Al-Hadid (57:2)", source: "Quran" },
  { arabic: "سُبْحَانَ الَّذِي خَلَقَ الْأَزْوَاجَ كُلَّهَا", text: "Exalted is He who created all pairs.", author: "Surah Ya-Sin (36:36)", source: "Quran" },
  { arabic: "وَمَا خَلَقْتُ الْجِنَّ وَالْإِنسَ إِلَّا لِيَعْبُدُونِ", text: "And I did not create the jinn and mankind except to worship Me.", author: "Surah Adh-Dhariyat (51:56)", source: "Quran" },
  { arabic: "الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ", text: "All praise is due to Allah, Lord of the worlds.", author: "Surah Al-Fatihah (1:2)", source: "Quran" },
  { arabic: "إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ", text: "It is You we worship and You we ask for help.", author: "Surah Al-Fatihah (1:5)", source: "Quran" },
  { arabic: "اهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ", text: "Guide us to the straight path.", author: "Surah Al-Fatihah (1:6)", source: "Quran" },
  { arabic: "وَإِن تَعُدُّوا نِعْمَةَ اللَّهِ لَا تُحْصُوهَا", text: "And if you should count the favors of Allah, you could not enumerate them.", author: "Surah Ibrahim (14:34)", source: "Quran" },
  { arabic: "أَفَلَا يَتَدَبَّرُونَ الْقُرْآنَ", text: "Then do they not reflect upon the Quran?", author: "Surah An-Nisa (4:82)", source: "Quran" },

  // ─── HADITH ───────────────────────────────────────────────────────────────
  { arabic: "إِنَّمَا الْأَعْمَالُ بِالنِّيَّاتِ", text: "Actions are judged by intentions.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { arabic: "الدِّينُ النَّصِيحَةُ", text: "The religion is sincere advice.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { arabic: "خَيْرُكُمْ مَنْ تَعَلَّمَ الْقُرْآنَ وَعَلَّمَهُ", text: "The best of you are those who learn the Quran and teach it.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { arabic: "الْمُسْلِمُ مَنْ سَلِمَ الْمُسْلِمُونَ مِنْ لِسَانِهِ وَيَدِهِ", text: "A Muslim is one from whose tongue and hands other Muslims are safe.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { arabic: "لَا يُؤْمِنُ أَحَدُكُمْ حَتَّى يُحِبَّ لِأَخِيهِ مَا يُحِبُّ لِنَفْسِهِ", text: "None of you truly believes until he loves for his brother what he loves for himself.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { arabic: "طَلَبُ الْعِلْمِ فَرِيضَةٌ عَلَى كُلِّ مُسْلِمٍ", text: "Seeking knowledge is an obligation upon every Muslim.", author: "Prophet Muhammad ﷺ", source: "Ibn Majah" },
  { arabic: "الصَّبْرُ نِصْفُ الْإِيمَانِ", text: "Patience is half of faith.", author: "Prophet Muhammad ﷺ", source: "Shu'ab al-Iman" },
  { arabic: "الطَّهُورُ شَطْرُ الْإِيمَانِ", text: "Cleanliness is half of faith.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { arabic: "مَنْ كَانَ يُؤْمِنُ بِاللَّهِ وَالْيَوْمِ الْآخِرِ فَلْيَقُلْ خَيْرًا أَوْ لِيَصْمُتْ", text: "Whoever believes in Allah and the Last Day, let him speak good or remain silent.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { arabic: "الْيَدُ الْعُلْيَا خَيْرٌ مِنَ الْيَدِ السُّفْلَى", text: "The upper hand is better than the lower hand. The upper hand is the one that gives, and the lower is the one that takes.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Be in this world as if you were a stranger or a traveler along a path.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Take advantage of five before five: your youth before your old age, your health before your illness, your wealth before your poverty, your free time before your preoccupation, and your life before your death.", author: "Prophet Muhammad ﷺ", source: "Shu'ab al-Iman" },
  { text: "The strongest among you is the one who controls himself when he is angry.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Make things easy and do not make them difficult. Cheer people up and do not drive them away.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Verily, Allah does not look at your appearance or wealth, but rather He looks at your hearts and actions.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "No one of you truly believes until he loves for his brother what he loves for himself.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "The best of people are those that bring most benefit to the rest of mankind.", author: "Prophet Muhammad ﷺ", source: "Daraqutni" },
  { text: "Feed the hungry, visit the sick, and free the captive.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Whoever removes a worldly hardship from a believer, Allah will remove one of the hardships of the Day of Resurrection from him.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "A good word is charity.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Smiling at your brother is charity.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "The world is a prison for the believer and a paradise for the disbeliever.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "Allah is gentle and loves gentleness in all matters.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "The most beloved of deeds to Allah are those that are most consistent, even if they are small.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "When Allah loves a servant, He tests him.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "If Allah wants good for someone, He gives him understanding of the religion.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Do not belittle any good deed, even if it is meeting your brother with a cheerful face.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "The greatest jihad is to battle your own soul, to fight the evil within yourself.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "Whoever is not grateful to people is not grateful to Allah.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "Every act of goodness is charity.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "Avoid envy, for envy devours good deeds just as fire devours firewood.", author: "Prophet Muhammad ﷺ", source: "Abu Dawud" },
  { text: "Modesty is part of faith.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "The believer does not defame, abuse, obscene talk, or use foul language.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "Make your character good for the people.", author: "Prophet Muhammad ﷺ", source: "Ahmad" },
  { text: "There is no disease that Allah has created, except that He also has created its remedy.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "The best among you is the one who is best to his family.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "Richness is not having many possessions, but richness is the richness of the soul.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Tie your camel first, then put your trust in Allah.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "Convey from me, even if it is one verse.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Paradise is surrounded by hardships and the Hellfire is surrounded by desires.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "The pen has been lifted and the pages have dried.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "Verily, with every hardship comes ease.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "The most perfect believer in faith is the one whose character is finest.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "Whoever loves to meet Allah, Allah loves to meet him.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Speak the truth even if it is bitter.", author: "Prophet Muhammad ﷺ", source: "Ibn Hibban" },
  { text: "There is no obedience to creation in disobedience to the Creator.", author: "Prophet Muhammad ﷺ", source: "Ahmad" },
  { text: "Your Lord is surprised by a young man who has no inclination toward desires.", author: "Prophet Muhammad ﷺ", source: "Ahmad" },
  { text: "Whoever conceals the faults of a Muslim, Allah will conceal his faults in this life and the next.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "None of you should wish for death because of a calamity that has befallen him.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Make things easy for people and do not make things difficult for them.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "The Muslim who mixes with people and bears patiently their hurtful words is better than one who does not mix with people and does not endure their hurtful words.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "The son of Adam does not fill any vessel worse than his stomach.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "Every child is born in a state of fitrah (natural disposition toward Islam).", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "A man follows the religion of his close friend, so let one of you look at whom he befriends.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "The signs of the hypocrite are three: when he speaks he lies, when he promises he breaks it, and when he is trusted he betrays.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Beware of the supplication of the oppressed, for there is no veil between it and Allah.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Leave that which makes you doubt for that which does not make you doubt.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "The halal is clear and the haram is clear, and between them are matters that are doubtful.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Verily the hearts of the children of Adam are between two fingers of the fingers of the Most Merciful, as one heart, which He turns however He wills.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "Fear Allah wherever you are, follow up a bad deed with a good deed and it will wipe it out, and behave well toward people.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "The dua of a Muslim for his brother in his absence will be answered.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "He who is not grateful to people is not grateful to Allah.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "Whoever builds a mosque for the sake of Allah, Allah will build for him a house in Paradise.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Do not waste water even if you are at a flowing river.", author: "Prophet Muhammad ﷺ", source: "Ibn Majah" },
  { text: "None of you has faith until I am more beloved to him than his father, his children, and all of mankind.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Whoever sees something evil should change it with his hand; if he cannot, then with his tongue; if he cannot, then with his heart — and that is the weakest of faith.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "The most burdensome prayers for the hypocrites are Isha and Fajr, but if they only knew what was in them, they would come even if they had to crawl.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Whoever guides someone to goodness will have a reward like the one who did it.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "The Muslim has five rights over his fellow Muslim: to return his greeting, to visit him when he is sick, to attend his funeral, to accept his invitation, and to respond to him when he sneezes.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "The best of you are those who learn the Quran and teach it.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Verily, knowledge is gained through learning.", author: "Prophet Muhammad ﷺ", source: "Al-Khatib" },
  { text: "The seeking of knowledge is obligatory for every Muslim.", author: "Prophet Muhammad ﷺ", source: "Ibn Majah" },
  { text: "Whoever treads a path in search of knowledge, Allah will make easy for him the path to paradise.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "Part of the perfection of one's Islam is his leaving that which does not concern him.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "Allah does not punish the individual for the sin of the community until they see evil being done right in front of them and are capable of stopping it, yet do not do so.", author: "Prophet Muhammad ﷺ", source: "Ahmad" },
  { text: "Verily, when a servant commits a sin, a black spot appears on his heart.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "Two words are light on the tongue, heavy on the scale, beloved to the Most Merciful: SubhanAllahi wa bihamdihi, SubhanAllahil Azim.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "If you feel no shame, then do as you wish.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "The best prayer after the obligatory prayers is the night prayer.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "Repentance wipes out what was before it.", author: "Prophet Muhammad ﷺ", source: "Ahmad" },
  { text: "The believer is a mirror to the believer.", author: "Prophet Muhammad ﷺ", source: "Abu Dawud" },
  { text: "Whoever relieves a Muslim of a burden from the burdens of the world, Allah will relieve him of a burden from the burdens on the Day of Judgement.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "Allah has ninety-nine names. Whoever learns them will enter Paradise.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "He who has in his heart the weight of a mustard seed of pride shall not enter Paradise.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "Truthfulness leads to righteousness and righteousness leads to Paradise.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Lying leads to wickedness and wickedness leads to the Hellfire.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "The most hated of all people to Allah is the most quarrelsome.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Do not be envious of one another, do not inflate prices by overbidding against one another, do not hate one another, do not shun one another. Be slaves of Allah and brothers.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "Whoever is kind, Allah will be kind to him; therefore be kind to man on earth and He Who is in heaven will show mercy on you.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "Whoever of you wakes up in the morning secured in his dwelling, healthy in his body, having his food for the day — it is as if the whole world has been gathered for him.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "A believer does not allow himself to be stung twice from the same hole.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Give charity without delay, for it stands in the way of calamity.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "The best of charity is that given by one who has little.", author: "Prophet Muhammad ﷺ", source: "Abu Dawud" },
  { text: "Charity does not decrease wealth.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "The merciful are shown mercy by the All-Merciful. Show mercy to those on earth and the One in the heavens will have mercy upon you.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "The best of people are those who are best in fulfilling their obligations.", author: "Prophet Muhammad ﷺ", source: "Ibn Majah" },
  { text: "Whoever does not show mercy will not be shown mercy.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Indeed, Allah is Pure and He only accepts that which is pure.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "If you had relied on Allah with true reliance, He would have provided sustenance for you just as He provides for the birds: they go forth hungry in the morning and return with a full belly at dusk.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "The first thing the slave will be asked about on the Day of Judgment is the prayer.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "Whoever does not recite Al-Fatiha in his prayer, his prayer is invalid.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "When one of you makes dua, he should be firm in his supplication and should not say: 'O Allah, if You will, give me,' for none can compel Allah.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Your parents are your paradise or your hellfire.", author: "Prophet Muhammad ﷺ", source: "Ibn Majah" },
  { text: "Righteousness is good character, and wrongdoing is that which wavers in your soul and which you dislike people finding out about.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "The greatest sin is to associate partners with Allah, then to be undutiful to parents.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "A man's true wealth is the good he does in this world.", author: "Prophet Muhammad ﷺ", source: "Ahmad" },
  { text: "The most complete of believers in faith are those with the best character.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "Do not grieve. What has reached you was never going to miss you, and what has missed you was never going to reach you.", author: "Prophet Muhammad ﷺ", source: "Abu Dawud" },
  { text: "Verily, the most honored of you in the sight of Allah is the most righteous of you.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Whoever among you sees an evil, let him change it with his hand. If he is unable, then with his tongue. If he is unable, then with his heart, and that is the weakest of faith.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "Indeed Allah has forgiven my ummah for what their souls whisper to them, as long as they do not act on it or speak of it.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "The one who is tested the most are the prophets, then the righteous, then those that follow in their footsteps.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },

  // ─── ISLAMIC SCHOLARS & PERSONALITIES ────────────────────────────────────
  { text: "If you want to focus more on Allah in your prayers, focus more on Him outside your prayers.", author: "Ibn al-Qayyim", source: "Islamic Scholar" },
  { text: "Whoever does not thank men does not thank Allah.", author: "Imam Ahmad ibn Hanbal", source: "Islamic Scholar" },
  { text: "The heart will rest and feel relief if it is settled with Allah. And it will worry and be anxious if it sought after other than Him.", author: "Ibn al-Qayyim", source: "Islamic Scholar" },
  { text: "The more knowledgeable you are, the more you realize how little you know.", author: "Imam Shafi'i", source: "Islamic Scholar" },
  { text: "Be with Allah and don't worry about anything else.", author: "Ibn Ata'illah al-Iskandari", source: "Islamic Scholar" },
  { text: "Whoever loves that Allah should answer his supplications in difficulty, let him increase his supplications in ease.", author: "Imam Tirmidhi", source: "Islamic Scholar" },
  { text: "Whoever is offered an apology from a fellow Muslim should accept it whether it is genuine or not, for if he does not then he will not come to me at the Hawd.", author: "Ibn Umar", source: "Islamic Scholar" },
  { text: "In the darkest of nights, the stars shine brightest. In your hardest of times, remember Allah is near.", author: "Ibn al-Qayyim", source: "Islamic Scholar" },
  { text: "Knowledge is not what is memorized; knowledge is what benefits.", author: "Imam Shafi'i", source: "Islamic Scholar" },
  { text: "I never debated with anyone but I prayed that Allah guard him and keep him safe.", author: "Imam Shafi'i", source: "Islamic Scholar" },
  { text: "Your cure is within you, but you do not sense it. Your sickness is from you, but you do not see it.", author: "Imam Ali ibn Abi Talib", source: "Islamic Scholar" },
  { text: "The one who does not know his own worth will never know the worth of others.", author: "Imam Ali ibn Abi Talib", source: "Islamic Scholar" },
  { text: "Do not be a slave to others when Allah has created you free.", author: "Imam Ali ibn Abi Talib", source: "Islamic Scholar" },
  { text: "Live amongst people in such a manner that if you die they weep over you and if you are alive they crave for your company.", author: "Imam Ali ibn Abi Talib", source: "Islamic Scholar" },
  { text: "Speak only when your words are more beautiful than silence.", author: "Imam Ali ibn Abi Talib", source: "Islamic Scholar" },
  { text: "Do not use the sharpness of your speech on the mother who taught you how to speak.", author: "Imam Ali ibn Abi Talib", source: "Islamic Scholar" },
  { text: "Do not let your difficulties fill you with anxiety; after all, it is only in the darkest nights that stars shine more brightly.", author: "Imam Ali ibn Abi Talib", source: "Islamic Scholar" },
  { text: "The strongest man is the one who, when he gets angry and his face reddens and his hackles rise, is able to defeat his anger.", author: "Imam Ali ibn Abi Talib", source: "Islamic Scholar" },
  { text: "Two things define you: your patience when you have nothing, and your attitude when you have everything.", author: "Imam Ali ibn Abi Talib", source: "Islamic Scholar" },
  { text: "The eyes are the window to the soul; look after what you let enter through them.", author: "Ibn al-Qayyim", source: "Islamic Scholar" },
  { text: "Sit with those who love Allah, for that enlightens the mind and awakens the heart.", author: "Ibn al-Qayyim", source: "Islamic Scholar" },
  { text: "The greatest sin is the one a person considers insignificant.", author: "Ibn al-Qayyim", source: "Islamic Scholar" },
  { text: "Sins cause harm and repentance removes it.", author: "Ibn al-Qayyim", source: "Islamic Scholar" },
  { text: "The most beneficial cure is perpetual engagement with Allah's remembrance.", author: "Ibn al-Qayyim", source: "Islamic Scholar" },
  { text: "When you feel that your heart has hardened, go to where the sick are, visit the graveyard, and remember death.", author: "Ibn al-Qayyim", source: "Islamic Scholar" },
  { text: "Be patient. Al-Sabr (patience) is a pillar of iman (faith). Verily, the reward of the patient is immense.", author: "Umar ibn al-Khattab", source: "Companion of the Prophet" },
  { text: "Hold yourself accountable before you are held accountable.", author: "Umar ibn al-Khattab", source: "Companion of the Prophet" },
  { text: "We were the most humiliated of people and Allah gave us honor through Islam. If we seek honor through anything other than Islam, Allah will humiliate us.", author: "Umar ibn al-Khattab", source: "Companion of the Prophet" },
  { text: "Fear the prayer of the oppressed, for there is no veil between it and Allah.", author: "Umar ibn al-Khattab", source: "Companion of the Prophet" },
  { text: "The best deed is that which a person does persistently, even if it is small.", author: "Aisha (RA)", source: "Companion of the Prophet" },
  { text: "Leave what makes you doubt for what does not make you doubt.", author: "Abu Bakr as-Siddiq", source: "Companion of the Prophet" },
  { text: "Patience is a pillar of faith.", author: "Abu Bakr as-Siddiq", source: "Companion of the Prophet" },
  { text: "If you want to know your rank with Allah, look at where He has placed Allah in your heart.", author: "Ibn Ata'illah", source: "Islamic Scholar" },
  { text: "Renounce the world and Allah will love you; renounce what others possess and people will love you.", author: "Imam Ahmad ibn Hanbal", source: "Islamic Scholar" },
  { text: "The most difficult of all deeds is to be just.", author: "Imam al-Nawawi", source: "Islamic Scholar" },
  { text: "Let not your tongue mention the shame of another, for you yourself are covered in shame, and all men have eyes.", author: "Imam Shafi'i", source: "Islamic Scholar" },
  { text: "Whoever learns the Quran, great things are ahead of him.", author: "Imam Shafi'i", source: "Islamic Scholar" },
  { text: "If you love good for yourself, give it to others first.", author: "Hasan al-Basri", source: "Islamic Scholar" },
  { text: "Son of Adam, you are nothing but a number of days. Whenever a day passes, a part of you has gone.", author: "Hasan al-Basri", source: "Islamic Scholar" },
  { text: "I looked at all friends, and did not find a better friend than safeguarding the tongue.", author: "Hasan al-Basri", source: "Islamic Scholar" },
  { text: "O son of Adam! Seek the next world and this world will come to you.", author: "Hasan al-Basri", source: "Islamic Scholar" },
  { text: "Beware of procrastination. It is the greatest of armies of Iblis against you.", author: "Ibn al-Jawzi", source: "Islamic Scholar" },
  { text: "Modesty before Allah means that you protect your head and what it contains, protect your stomach and what it holds, remember death and the experience of annihilation.", author: "Ibn al-Qayyim", source: "Islamic Scholar" },
  { text: "The slave of Allah who prays regularly at night, Allah will build for him a house in Jannah.", author: "Imam Ahmad ibn Hanbal", source: "Islamic Scholar" },
  { text: "Three things cannot be recovered: The arrow launched from its bow, the word spoken in haste, and the missed opportunity.", author: "Imam Ali ibn Abi Talib", source: "Islamic Scholar" },
  { text: "Value the one who values you when they have other options.", author: "Imam Ali ibn Abi Talib", source: "Islamic Scholar" },
  { text: "Knowledge enlivens the soul.", author: "Imam Ali ibn Abi Talib", source: "Islamic Scholar" },
  { text: "He who has a thousand friends has not a friend to spare, and he who has one enemy will meet him everywhere.", author: "Imam Ali ibn Abi Talib", source: "Islamic Scholar" },
  { text: "A man who has no wealth should not despair; and he who has wealth should not be proud. Allah gives to whom He wills without measure.", author: "Imam al-Ghazali", source: "Islamic Scholar" },
  { text: "The real voyage of discovery consists not in seeking new landscapes, but in having new eyes — eyes that see everything as from Allah.", author: "Imam al-Ghazali", source: "Islamic Scholar" },
  { text: "Knowledge without action is wastefulness, and action without knowledge is foolishness.", author: "Imam al-Ghazali", source: "Islamic Scholar" },
  { text: "If you see that someone is being tested with a sin, do not look down on him. Look instead at what Allah has protected you from.", author: "Imam al-Ghazali", source: "Islamic Scholar" },
  { text: "Half of knowledge is saying I do not know.", author: "Imam Malik", source: "Islamic Scholar" },
  { text: "Do not tell me how many you have memorized; tell me how much of it you act upon.", author: "Imam Malik", source: "Islamic Scholar" },
  { text: "Whoever wants to purify his heart, let him prefer Allah over his desires.", author: "Ibn al-Qayyim", source: "Islamic Scholar" },
  { text: "When the heart is not at rest, it seeks rest in everything and finds rest nowhere.", author: "Ibn al-Qayyim", source: "Islamic Scholar" },
  { text: "Patience has two parts: patience in worship and patience away from what Allah has forbidden.", author: "Ibn al-Qayyim", source: "Islamic Scholar" },
  { text: "If dunia were worth a mosquito's wing to Allah, He would not have given the disbeliever a sip of water from it.", author: "Imam Tirmidhi", source: "Islamic Scholar" },
  { text: "Thankfulness to Allah for favors is itself a favor in need of thankfulness.", author: "Ibn Ata'illah", source: "Islamic Scholar" },
  { text: "Do not let the present moment pass without making the most of it for Allah.", author: "Imam al-Ghazali", source: "Islamic Scholar" },
  { text: "Whoever is silent about truth is a mute devil.", author: "Imam Shafi'i", source: "Islamic Scholar" },
  { text: "Your ambition should not be to gain the pleasure of people; aim rather to gain the pleasure of Allah.", author: "Ibn al-Qayyim", source: "Islamic Scholar" },
  { text: "A person's tongue can give you the taste of his heart.", author: "Ibn al-Qayyim", source: "Islamic Scholar" },
  { text: "The more a person knows, the more aware he becomes of his own ignorance.", author: "Ibn al-Qayyim", source: "Islamic Scholar" },
  { text: "Protect your heart from attachment to anything other than Allah.", author: "Ibn al-Qayyim", source: "Islamic Scholar" },
  { text: "Do not be happy with praise that you do not deserve, and do not be sad with blame you do not deserve.", author: "Ibn al-Qayyim", source: "Islamic Scholar" },
  { text: "Do not despair of the mercy of Allah, for you cannot know what mercy lies ahead.", author: "Ibn al-Qayyim", source: "Islamic Scholar" },
  { text: "Trust in Allah, but tie your camel. That is the sunnah of your Prophet.", author: "Ibn al-Qayyim", source: "Islamic Scholar" },
  { text: "Every human being is after happiness. The difference is that the believer knows where happiness truly lies.", author: "Ibn al-Qayyim", source: "Islamic Scholar" },
  { text: "Indeed, the believer is stronger than mountains. Mountains cannot be moved from their place, but a believer's faith can move mountains.", author: "Bilal ibn Rabah", source: "Companion of the Prophet" },
  { text: "Richness is not from an abundance of worldly goods, but richness is richness of the soul.", author: "Umar ibn al-Khattab", source: "Companion of the Prophet" },
  { text: "People are enemies of what they do not know.", author: "Imam Ali ibn Abi Talib", source: "Islamic Scholar" },
  { text: "The biggest gift you can give to someone is your time.", author: "Imam Ali ibn Abi Talib", source: "Islamic Scholar" },
  { text: "Your enemies will fear you more if they know that you will always tell the truth.", author: "Imam Ali ibn Abi Talib", source: "Islamic Scholar" },
  { text: "Generosity is to help a deserving person without his request.", author: "Imam Ali ibn Abi Talib", source: "Islamic Scholar" },
  { text: "Forgive others as quickly as you expect Allah to forgive you.", source: "Islamic Wisdom" },
  { text: "Your deen (religion) is your identity. Don't lose yourself trying to fit into this world.", source: "Islamic Wisdom" },
  { text: "The further you are from Allah, the longer every path seems. The nearer you are to Allah, every path becomes easy.", source: "Islamic Wisdom" },
  { text: "Before you speak, ask yourself: Is it true? Is it necessary? Is it kind?", source: "Islamic Wisdom" },
  { text: "Do not grieve over what has passed. What was decreed has been decreed, and what was not decreed will never come to pass.", source: "Islamic Wisdom" },
  { text: "Prayer is the key to all good.", source: "Islamic Wisdom" },
  { text: "The deen is easy. Ease your way into it gradually.", source: "Islamic Wisdom" },
  { text: "The believer's shade on the Day of Resurrection will be his charity.", source: "Islamic Wisdom" },
  { text: "If your heart is not moved by the Quran, ask yourself what has moved it.", source: "Islamic Wisdom" },
  { text: "The best time to plant a tree was 20 years ago. The second best time is now. The best time to turn to Allah — is now.", source: "Islamic Wisdom" },
  { text: "Whoever you cannot make happy, at least do not make them sad.", source: "Islamic Wisdom" },
  { text: "Contentment is a treasure that never runs out.", source: "Islamic Wisdom" },
  { text: "A heart free of envy is a heart at peace.", source: "Islamic Wisdom" },
  { text: "What comes from the heart reaches the heart.", source: "Islamic Wisdom" },
  { text: "Whatever is written for you will reach you, even if it is underneath two mountains. And whatever is not written for you, you will not get, even if it is between your two lips.", source: "Islamic Wisdom" },
  { text: "Whoever knocks on the door of Allah, it will be opened. Whoever asks of Allah, He will give. Whoever relies upon Allah, He will suffice.", source: "Islamic Wisdom" },
  { text: "The cure for ignorance is to ask.", source: "Islamic Wisdom" },
  { text: "The real poverty is the poverty of the soul.", source: "Islamic Wisdom" },
  { text: "A moment of patience in a moment of anger saves a thousand moments of regret.", source: "Islamic Wisdom" },
  { text: "Be careful with your intentions. It is the unseen force that shapes your deeds.", source: "Islamic Wisdom" },
  { text: "Do not look down upon any Muslim, for even the most insignificant in your eyes may be the greatest in the sight of Allah.", source: "Islamic Wisdom" },
  { text: "The greatest distance between people is misunderstanding.", source: "Islamic Wisdom" },
  { text: "Good character is the best gift you can give to those around you.", source: "Islamic Wisdom" },
  { text: "The one who truly loves Allah will love all that Allah loves.", source: "Islamic Wisdom" },
  { text: "Do not waste your time in waiting for tomorrow. Today is what you have.", source: "Islamic Wisdom" },
  { text: "When we repair our relationship with Allah, He repairs everything else for us.", source: "Islamic Wisdom" },
  { text: "The believer who recites the Quran is like a citron whose fragrance is sweet and whose taste is sweet.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Engage much in the remembrance of Allah to the point that people say you are mad.", author: "Prophet Muhammad ﷺ", source: "Ahmad" },
  { text: "Among the actions and good deeds for which a believer will continue to receive reward after his death are: knowledge which he taught and spread, a righteous son whom he left behind, a copy of the Quran which he left as a legacy, a mosque he built, a house he built for the traveler, a stream he caused to flow, or charity which he gave during his lifetime while he was in good health. These will continue to bring him reward after his death.", author: "Prophet Muhammad ﷺ", source: "Ibn Majah" },
  { text: "When a man dies, his deeds come to an end except for three things: ongoing charity, beneficial knowledge, or a righteous son who prays for him.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "The most beloved of places to Allah are the mosques, and the most hated of places to Allah are the markets.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "Visit the sick, feed the hungry, and free the captives.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Verily, gentleness does not enter into anything except that it beautifies it, and it is not removed from anything except that it disgraces it.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "Whoever memorizes ten ayahs from the beginning of Surah Al-Kahf will be protected from the Dajjal.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "Allah is beautiful and He loves beauty.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "There is a piece of flesh in the body, if it becomes good, the whole body becomes good, and if it gets spoiled, the whole body gets spoiled — and that is the heart.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },

  // ─── MOTIVATIONAL ISLAMIC QUOTES ─────────────────────────────────────────
  { text: "Never underestimate the power of dua. You are asking the One who has power over all things.", source: "Islamic Reminder" },
  { text: "Every hardship is a stepping stone to get closer to Allah. Do not let it stop you.", source: "Islamic Reminder" },
  { text: "Allah is closer to you than your jugular vein. Never feel alone.", source: "Islamic Reminder" },
  { text: "Your darkest night will produce your brightest dawn. Trust Allah's plan.", source: "Islamic Reminder" },
  { text: "Pray as if everything depends on Allah. Work as if everything depends on you.", source: "Islamic Reminder" },
  { text: "You were created with a purpose. Do not waste your life on things that do not matter.", source: "Islamic Reminder" },
  { text: "The more you remember Allah, the more He remembers you. Fill your heart with His remembrance.", source: "Islamic Reminder" },
  { text: "Islam does not promise a life without problems; it promises that you will never face them alone.", source: "Islamic Reminder" },
  { text: "Your sins are not greater than Allah's mercy. Turn back to Him now.", source: "Islamic Reminder" },
  { text: "The world was not built for you to settle in; it was built for you to pass through on your way to something eternal.", source: "Islamic Reminder" },
  { text: "Never lose hope in Allah. He is Al-Wahhab — the one who gives without measure.", source: "Islamic Reminder" },
  { text: "The test of faith is not whether you fall, but whether you get back up and return to Allah.", source: "Islamic Reminder" },
  { text: "Every day you wake up is another chance to be better than yesterday.", source: "Islamic Reminder" },
  { text: "Do not let the world distract you from the Hereafter. The Hereafter is where you will truly live.", source: "Islamic Reminder" },
  { text: "Sometimes Allah breaks your spirit to save your soul. Sometimes He breaks your heart to make you whole.", source: "Islamic Reminder" },
  { text: "Focus on fixing yourself, and Allah will fix what is around you.", source: "Islamic Reminder" },
  { text: "Your tears in sujud are worth more than all the laughter this world can offer.", source: "Islamic Reminder" },
  { text: "When you are down to nothing, Allah is up to something. Trust His plan.", source: "Islamic Reminder" },
  { text: "The struggle you are in today is developing the strength you need for tomorrow.", source: "Islamic Reminder" },
  { text: "Be kind, for everyone you meet is fighting a battle you know nothing about.", source: "Islamic Reminder" },
  { text: "The best investment you can make is in your relationship with Allah.", source: "Islamic Reminder" },
  { text: "Tawakkul is not inaction. It is taking action, then trusting Allah with the result.", source: "Islamic Reminder" },
  { text: "When you wake up for Fajr, remember: the angels made dua for you last night.", source: "Islamic Reminder" },
  { text: "Be the person that when you walk in a room, the room gets brighter — not with your looks but with your character.", source: "Islamic Reminder" },
  { text: "Every time you resist temptation for Allah's sake, your faith grows stronger.", source: "Islamic Reminder" },
  { text: "The greatest revolution a Muslim can make is the revolution within the self.", source: "Islamic Reminder" },
  { text: "You cannot always control what happens to you, but you can always control how you respond — with patience and trust in Allah.", source: "Islamic Reminder" },
  { text: "When everything feels hopeless, make dua. When everything feels perfect, make dua. Make dua in all states.", source: "Islamic Reminder" },
  { text: "Teach yourself to be grateful before loss teaches you to appreciate what you had.", source: "Islamic Reminder" },
  { text: "The strongest bridge to Allah is sincerity of heart.", source: "Islamic Reminder" },
  { text: "You are never too broken to be fixed by Allah.", source: "Islamic Reminder" },
  { text: "Turn your wounds into wisdom, your pain into patience, your trials into tawakkul.", source: "Islamic Reminder" },
  { text: "Do not despair. Allah has not forgotten you. He is simply preparing you for what is ahead.", source: "Islamic Reminder" },
  { text: "The closer you are to Allah, the easier your struggles become to bear.", source: "Islamic Reminder" },
  { text: "Be soft with people. You never know what battles they are fighting behind closed doors.", source: "Islamic Reminder" },
  { text: "The depth of your dua reflects the depth of your need for Allah.", source: "Islamic Reminder" },
  { text: "Do not attach your happiness to things that can be taken away. Attach it to the One who never leaves.", source: "Islamic Reminder" },
  { text: "Real success is not measured in wealth or status, but in the health of your relationship with Allah.", source: "Islamic Reminder" },
  { text: "When you feel weak, make istighfar. When you feel strong, make shukr.", source: "Islamic Reminder" },
  { text: "The believer is always hopeful — hopeful in Allah's mercy, hopeful of a better tomorrow.", source: "Islamic Reminder" },
  { text: "Hardship is a reminder that we are not in control — and that the One who is, loves us.", source: "Islamic Reminder" },
  { text: "You are not what happened to you. You are how you responded to it, with the help of Allah.", source: "Islamic Reminder" },
  { text: "Never delay a good deed. The opportunity may not come again.", source: "Islamic Reminder" },
  { text: "Make your heart a place where Allah is always welcomed.", source: "Islamic Reminder" },
  { text: "The one who cries out of fear of Allah will be given shade on the Day when there is no shade but His.", source: "Islamic Reminder" },
  { text: "Stop trying to find peace in the creation and start finding it in the Creator.", source: "Islamic Reminder" },
  { text: "Your dua is your weapon. Use it.", source: "Islamic Reminder" },
  { text: "Whatever you have given for the sake of Allah, it is saved for you in the most permanent of places.", source: "Islamic Reminder" },
  { text: "Keep your eyes on the Hereafter and this world will arrange itself.", source: "Islamic Reminder" },
  { text: "Every leaf that falls is by Allah's permission. Nothing in your life happens by accident.", source: "Islamic Reminder" },
  { text: "Be patient with yourself. Spiritual growth takes time.", source: "Islamic Reminder" },
  { text: "When the world closes all its doors on you, the door to Allah is always open.", source: "Islamic Reminder" },
  { text: "Make space in your life for what matters: salah, family, kindness, and gratitude.", source: "Islamic Reminder" },
  { text: "Do not compare your chapter 3 to someone else's chapter 20. Allah writes every story differently.", source: "Islamic Reminder" },
  { text: "Seek forgiveness before you need it. Seek patience before trials arrive. Seek gratitude before blessings depart.", source: "Islamic Reminder" },
  { text: "A believer's heart is at peace not because life is easy, but because his Lord is great.", source: "Islamic Reminder" },
  { text: "The remembrance of Allah is food for the soul. A soul without it slowly starves.", source: "Islamic Reminder" },
  { text: "You do not need the world to validate you. Allah already chose you when He guided you to Islam.", source: "Islamic Reminder" },
  { text: "Return to Allah before returning to anything else.", source: "Islamic Reminder" },
  { text: "Whoever gives up something for the sake of Allah, Allah replaces it with something better.", source: "Islamic Reminder" },
  { text: "If you are breathing, you still have time to make it right with Allah.", source: "Islamic Reminder" },
  { text: "The believer does not complain — he makes dua.", source: "Islamic Reminder" },
  { text: "Let your character speak louder than your words.", source: "Islamic Reminder" },
  { text: "Gratitude unlocks the fullness of life. The more you give thanks to Allah, the more He gives.", source: "Islamic Reminder" },
  { text: "Whatever Allah has taken from you, He has taken it for your protection. Whatever He gave you, it was always meant for you.", source: "Islamic Reminder" },
  { text: "The night you spend crying to Allah in sujud will be repaid in a morning you cannot yet imagine.", source: "Islamic Reminder" },
  { text: "You are stronger than you think, because Allah is stronger than anything you face.", source: "Islamic Reminder" },
  { text: "Be the change in your community that you wish to see in the ummah.", source: "Islamic Reminder" },
  { text: "Sabr is not passive. It is active patience — continuing to strive while trusting Allah.", source: "Islamic Reminder" },
  { text: "The greatest gift to your children is not wealth, but a strong relationship with Allah.", source: "Islamic Reminder" },
  { text: "When something is taken from you, know that something better is on its way — if you remain patient.", source: "Islamic Reminder" },
  { text: "Every time you lower yourself in humility before Allah, He raises your rank.", source: "Islamic Reminder" },
  { text: "Do good deeds in private and Allah will announce your virtues in public.", source: "Islamic Reminder" },
  { text: "Make tawbah before the sun sets on your sins. Allah's door of forgiveness is always open.", source: "Islamic Reminder" },
  { text: "The ummah rises when its individuals return to Allah.", source: "Islamic Reminder" },
  { text: "Your heart was designed to love Allah. Everything else is temporary.", source: "Islamic Reminder" },
  { text: "Islam is not a burden — it is a liberation from everything that would weigh your soul down.", source: "Islamic Reminder" },
  { text: "One sincere moment of dua can change the course of your entire life.", source: "Islamic Reminder" },
  { text: "You are a masterpiece created by Allah. Do not let the world reduce you to anything less.", source: "Islamic Reminder" },
  { text: "The one who reads the Quran fluently is with the noble and righteous scribes. The one who reads with difficulty has a double reward.", source: "Islamic Reminder" },
  { text: "Honor your parents while they are still alive. Their dua for you is a treasure unlike any other.", source: "Islamic Reminder" },
  { text: "Speak less. Pray more. Give more. Judge less. Love more. This is the way.", source: "Islamic Reminder" },
  { text: "Real strength is when you have every reason to break down, but you choose to make sujud instead.", source: "Islamic Reminder" },
  { text: "The quality of your worship reflects the quality of your connection with Allah.", source: "Islamic Reminder" },
  { text: "When you feel empty, fill yourself with Quran.", source: "Islamic Reminder" },
  { text: "A heart connected to Allah is never truly broken — it is always being built back up.", source: "Islamic Reminder" },
  { text: "The longer the night of patience, the brighter the dawn of relief.", source: "Islamic Reminder" },
  { text: "You cannot control what people think of you, but you can control what Allah thinks of you.", source: "Islamic Reminder" },
  { text: "Make your intentions pure and watch how Allah opens doors you never even knocked on.", source: "Islamic Reminder" },
  { text: "The smallest act of kindness has the power to change someone's world.", source: "Islamic Reminder" },
  { text: "This life is a test. Stop trying to pass it with the wrong answers.", source: "Islamic Reminder" },
  { text: "Do not let your heart grieve over what Allah has written for others. Be grateful for your own portion.", source: "Islamic Reminder" },

  // ─── MORE HADITH ──────────────────────────────────────────────────────────
  { text: "Whoever does not thank people, does not thank Allah.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "It is sufficient evil for a person to hold his brother Muslim in contempt.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "The Hour will not be established until two large groups of Muslims fight one another with many casualties on both sides, and they both will be following the same religious doctrine.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Do not laugh too much, for excessive laughter kills the heart.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "Hastiness is from Shaytan, and deliberateness is from Allah.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "Lower your wing for your parents.", author: "Prophet Muhammad ﷺ", source: "Islamic Wisdom" },
  { text: "Look at those who are lower than you, not at those who are higher than you, so that you will not undervalue the blessings of Allah upon you.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "There is no body of work more virtuous in the sight of Allah than knowledge that benefits people.", author: "Prophet Muhammad ﷺ", source: "Tabarani" },
  { text: "Beware of this world, for it is sweet and tempting.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "Allah does not remove knowledge by extracting it from the hearts of men, but rather He removes knowledge by taking away the scholars.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Whoever prays the two cool prayers will enter Paradise.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "The most virtuous jihad is a just word spoken before a tyrannical ruler.", author: "Prophet Muhammad ﷺ", source: "Abu Dawud" },
  { text: "When you see a person who has been given more than you in money and beauty, look to those who have been given less.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "The believer is not one who eats his fill when the neighbor beside him is hungry.", author: "Prophet Muhammad ﷺ", source: "Al-Adab Al-Mufrad" },
  { text: "Protect the earth for it is your mother.", author: "Prophet Muhammad ﷺ", source: "Ahmad" },
  { text: "Do not cut down trees unnecessarily.", author: "Prophet Muhammad ﷺ", source: "Abu Dawud" },
  { text: "Whoever plants a tree and it gives fruit, as long as it continues to give fruit, it is charity for him.", author: "Prophet Muhammad ﷺ", source: "Ahmad" },
  { text: "The most complete gift of Allah is a life based on good character.", author: "Prophet Muhammad ﷺ", source: "Ahmad" },
  { text: "On the authority of your Lord: Whoever remembers Me in himself, I remember him in Myself. Whoever mentions Me in a gathering, I mention him in a better gathering.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "He who has wronged you should be forgiven, and he who has deprived you should be given.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Every day that the sun rises, charity is due from every joint of a person.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "To make peace between two people is charity.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Kind speech and forgiveness are better than charity followed by injury.", author: "Prophet Muhammad ﷺ", source: "Quran — Al-Baqarah 2:263" },
  { text: "Whoever is pleased that Allah answers his prayers in difficult times, let him make many supplications in easy times.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "Be content with what Allah has given you, and you will be among the richest of people.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "Know that what has passed you by was not going to befall you; and that what has befallen you was not going to pass you by.", author: "Prophet Muhammad ﷺ", source: "Abu Dawud" },
  { text: "The servant of Allah will continue to receive expansion in his chest and elevation in rank as long as he forgives.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "Do not abuse the dead, for they have passed on to what they have sent forth.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Exchange gifts, for gifts remove rancor.", author: "Prophet Muhammad ﷺ", source: "Al-Adab Al-Mufrad" },
  { text: "Help your brother, whether he is an oppressor or is oppressed. People asked: how do we help him if he is an oppressor? He said: by stopping him from oppressing others.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "The best of you is the one who learns the Quran and teaches it to others.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "There is nothing heavier on the scale than good character.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "The merciful will be shown mercy by the Merciful One. Be merciful to those on earth and the One in the heavens will be merciful to you.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "Whoever reads a letter from the Book of Allah will have a reward for it, and that reward will be multiplied by ten.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "The one who is most unjust is the one who oppresses after he has been forgiven.", author: "Prophet Muhammad ﷺ", source: "Ahmad" },
  { text: "Do not hate each other, do not envy each other, do not turn away from each other, and be brothers, O servants of Allah.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Every act of kindness is charity.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Allah loves that you be proficient in whatever you do.", author: "Prophet Muhammad ﷺ", source: "Tabarani" },
  { text: "A believer is never pricked by a thorn except that Allah will expiate some of his sins because of it.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "When Allah intends good for someone, He afflicts him with trials.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Whoever wakes up and his greatest concern is other than Allah, then he is not from Allah and Allah is not preoccupied with him.", author: "Prophet Muhammad ﷺ", source: "Hakim" },
  { text: "No human being has ever filled a vessel worse than his own stomach. The son of Adam needs no more than a few morsels of food to keep up his strength.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "Your smile for your brother is charity.", author: "Prophet Muhammad ﷺ", source: "Tirmidhi" },
  { text: "Silence is wisdom, and few are those who practice it.", author: "Prophet Muhammad ﷺ", source: "Shu'ab al-Iman" },
  { text: "Whoever believes in Allah and the Last Day should honor his guest.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "The one who gives in charity and the one who collects it are equal in reward.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Do good and you will be met with good.", author: "Prophet Muhammad ﷺ", source: "Islamic Wisdom" },
  { text: "Whoever covers the fault of a Muslim, Allah will cover his faults on the Day of Judgment.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },
  { text: "Fasting is a shield from the Hellfire.", author: "Prophet Muhammad ﷺ", source: "Ahmad" },
  { text: "Whoever fasts Ramadan with faith and seeking reward, his previous sins will be forgiven.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "Whoever prays qiyam on Laylat al-Qadr out of faith and seeking reward, his previous sins will be forgiven.", author: "Prophet Muhammad ﷺ", source: "Sahih Bukhari" },
  { text: "The dua of a fasting person is not rejected.", author: "Prophet Muhammad ﷺ", source: "Ibn Majah" },
  { text: "Give the worker his wages before his sweat dries.", author: "Prophet Muhammad ﷺ", source: "Ibn Majah" },
  { text: "Whosoever of you sees an evil action, let him change it with his hand; and if he is not able to do so, then with his tongue; and if he is not able to do so, then with his heart — and that is the weakest of faith.", author: "Prophet Muhammad ﷺ", source: "Sahih Muslim" },

  // ─── MORE QURAN VERSES ────────────────────────────────────────────────────
  { arabic: "وَنَحْنُ أَقْرَبُ إِلَيْهِ مِنْ حَبْلِ الْوَرِيدِ", text: "And We are closer to him than his jugular vein.", author: "Surah Qaf (50:16)", source: "Quran" },
  { arabic: "إِنَّ الْإِنسَانَ لَفِي خُسْرٍ", text: "Indeed, mankind is in loss.", author: "Surah Al-Asr (103:2)", source: "Quran" },
  { arabic: "إِلَّا الَّذِينَ آمَنُوا وَعَمِلُوا الصَّالِحَاتِ", text: "Except for those who have believed and done righteous deeds.", author: "Surah Al-Asr (103:3)", source: "Quran" },
  { arabic: "وَتَوَاصَوْا بِالْحَقِّ وَتَوَاصَوْا بِالصَّبْرِ", text: "And advised each other to truth and advised each other to patience.", author: "Surah Al-Asr (103:3)", source: "Quran" },
  { arabic: "فَلَا تَكُن فِي مِرْيَةٍ مِّنْهُ", text: "So be not in doubt about it.", author: "Surah Hud (11:17)", source: "Quran" },
  { arabic: "إِنَّ الْحَسَنَاتِ يُذْهِبْنَ السَّيِّئَاتِ", text: "Indeed, good deeds do away with misdeeds.", author: "Surah Hud (11:114)", source: "Quran" },
  { arabic: "وَمَن يَعْمَلْ مِثْقَالَ ذَرَّةٍ خَيْرًا يَرَهُ", text: "And whoever does an atom's weight of good will see it.", author: "Surah Az-Zalzalah (99:7)", source: "Quran" },
  { arabic: "وَمَن يَعْمَلْ مِثْقَالَ ذَرَّةٍ شَرًّا يَرَهُ", text: "And whoever does an atom's weight of evil will see it.", author: "Surah Az-Zalzalah (99:8)", source: "Quran" },
  { arabic: "فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ", text: "So which of the favors of your Lord would you deny?", author: "Surah Ar-Rahman (55:13)", source: "Quran" },
  { arabic: "الرَّحْمَٰنُ عَلَّمَ الْقُرْآنَ", text: "The Most Merciful — taught the Quran.", author: "Surah Ar-Rahman (55:1-2)", source: "Quran" },
  { arabic: "وَاللَّيْلِ إِذَا يَغْشَىٰ", text: "By the night when it covers.", author: "Surah Al-Layl (92:1)", source: "Quran" },
  { arabic: "وَالضُّحَىٰ وَاللَّيْلِ إِذَا سَجَىٰ", text: "By the morning brightness, and the night when it covers with darkness.", author: "Surah Ad-Duha (93:1-2)", source: "Quran" },
  { arabic: "مَا وَدَّعَكَ رَبُّكَ وَمَا قَلَىٰ", text: "Your Lord has not taken leave of you, nor has He detested you.", author: "Surah Ad-Duha (93:3)", source: "Quran" },
  { arabic: "وَلَلْآخِرَةُ خَيْرٌ لَّكَ مِنَ الْأُولَىٰ", text: "And the Hereafter is better for you than the first life.", author: "Surah Ad-Duha (93:4)", source: "Quran" },
  { arabic: "وَلَسَوْفَ يُعْطِيكَ رَبُّكَ فَتَرْضَىٰ", text: "And your Lord is going to give you, and you will be satisfied.", author: "Surah Ad-Duha (93:5)", source: "Quran" },
  { arabic: "أَلَمْ يَجِدْكَ يَتِيمًا فَآوَىٰ", text: "Did He not find you an orphan and give shelter?", author: "Surah Ad-Duha (93:6)", source: "Quran" },
  { arabic: "وَوَجَدَكَ ضَالًّا فَهَدَىٰ", text: "And He found you lost and guided you.", author: "Surah Ad-Duha (93:7)", source: "Quran" },
  { arabic: "وَوَجَدَكَ عَائِلًا فَأَغْنَىٰ", text: "And He found you poor and made you self-sufficient.", author: "Surah Ad-Duha (93:8)", source: "Quran" },
  { arabic: "يَا أَيُّهَا الَّذِينَ آمَنُوا لَا تُلْهِكُمْ أَمْوَالُكُمْ وَلَا أَوْلَادُكُمْ عَن ذِكْرِ اللَّهِ", text: "O you who have believed, let not your wealth and your children divert you from the remembrance of Allah.", author: "Surah Al-Munafiqun (63:9)", source: "Quran" },
  { arabic: "إِنَّ اللَّهَ اشْتَرَىٰ مِنَ الْمُؤْمِنِينَ أَنفُسَهُمْ وَأَمْوَالَهُم", text: "Indeed, Allah has purchased from the believers their lives and their properties.", author: "Surah At-Tawbah (9:111)", source: "Quran" },
  { arabic: "وَلَا تَهِنُوا وَلَا تَحْزَنُوا وَأَنتُمُ الْأَعْلَوْنَ", text: "Do not weaken and do not grieve, and you will be superior if you are true believers.", author: "Surah Al-Imran (3:139)", source: "Quran" },
  { arabic: "وَاللَّهُ وَلِيُّ الْمُؤْمِنِينَ", text: "And Allah is the ally of the believers.", author: "Surah Al-Imran (3:68)", source: "Quran" },
  { arabic: "وَتُوبُوا إِلَى اللَّهِ جَمِيعًا أَيُّهَ الْمُؤْمِنُونَ لَعَلَّكُمْ تُفْلِحُونَ", text: "And turn to Allah in repentance, all of you, O believers, that you might succeed.", author: "Surah An-Nur (24:31)", source: "Quran" },
  { arabic: "وَيَدْعُ الْإِنسَانُ بِالشَّرِّ دُعَاءَهُ بِالْخَيْرِ", text: "And man supplicates for evil as he supplicates for good, and man is ever hasty.", author: "Surah Al-Isra (17:11)", source: "Quran" },
  { arabic: "إِنَّ الصَّلَاةَ كَانَتْ عَلَى الْمُؤْمِنِينَ كِتَابًا مَّوْقُوتًا", text: "Indeed, prayer has been decreed upon the believers a decree of specified times.", author: "Surah An-Nisa (4:103)", source: "Quran" },
  { arabic: "وَأَقِيمُوا الصَّلَاةَ وَآتُوا الزَّكَاةَ", text: "And establish prayer and give zakah.", author: "Surah Al-Baqarah (2:43)", source: "Quran" },
  { arabic: "وَبِالْوَالِدَيْنِ إِحْسَانًا", text: "And to parents, good treatment.", author: "Surah An-Nisa (4:36)", source: "Quran" },
  { arabic: "وَقَضَىٰ رَبُّكَ أَلَّا تَعْبُدُوا إِلَّا إِيَّاهُ وَبِالْوَالِدَيْنِ إِحْسَانًا", text: "And your Lord has decreed that you not worship except Him, and to parents, good treatment.", author: "Surah Al-Isra (17:23)", source: "Quran" },
  { arabic: "فَلَا تَقُل لَّهُمَا أُفٍّ وَلَا تَنْهَرْهُمَا", text: "Say not to them even 'ugh', and do not repel them.", author: "Surah Al-Isra (17:23)", source: "Quran" },
  { arabic: "وَقُل رَّبِّ ارْحَمْهُمَا كَمَا رَبَّيَانِي صَغِيرًا", text: "And say: My Lord, have mercy upon them as they brought me up when I was small.", author: "Surah Al-Isra (17:24)", source: "Quran" },
  { arabic: "إِنَّ أَكْرَمَكُمْ عِندَ اللَّهِ أَتْقَاكُمْ", text: "Indeed, the most noble of you in the sight of Allah is the most righteous of you.", author: "Surah Al-Hujurat (49:13)", source: "Quran" },
  { arabic: "يَا أَيُّهَا النَّاسُ إِنَّا خَلَقْنَاكُم مِّن ذَكَرٍ وَأُنثَىٰ", text: "O mankind, indeed We have created you from male and female and made you peoples and tribes that you may know one another.", author: "Surah Al-Hujurat (49:13)", source: "Quran" },
  { arabic: "يَا أَيُّهَا الَّذِينَ آمَنُوا اجْتَنِبُوا كَثِيرًا مِّنَ الظَّنِّ", text: "O you who have believed, avoid much negative assumption.", author: "Surah Al-Hujurat (49:12)", source: "Quran" },

// ─── State ────────────────────────────────────────────────
let currentQuote = { text: '', author: '', arabic: '', source: '' };
let isLoading = false;
let lastIndex = -1;

// ─── UI helpers ───────────────────────────────────────────
const quoteBox      = document.getElementById('quoteBox');
const quoteContent  = document.getElementById('quoteContent');
const loadingSpinner= document.getElementById('loadingSpinner');
const quoteText     = document.getElementById('quoteText');
const authorText    = document.getElementById('authorText');
const arabicText    = document.getElementById('arabicText');
const arabicDivider = document.getElementById('arabicDivider');
const sourceTag     = document.getElementById('sourceTag');
const sourceTagText = document.getElementById('sourceTagText');
const errorMsg      = document.getElementById('errorMsg');
const generateBtn   = document.getElementById('generateBtn');

function showLoading() {
  isLoading = true;
  generateBtn.disabled = true;
  quoteBox.classList.remove('visible');
  quoteContent.classList.add('hidden');
  errorMsg.classList.remove('show');
  loadingSpinner.classList.add('active');
  setTimeout(() => quoteBox.classList.add('visible'), 50);
}

function showQuote(q) {
  currentQuote = q;
  isLoading = false;
  generateBtn.disabled = false;

  loadingSpinner.classList.remove('active');
  errorMsg.classList.remove('show');

  // Arabic
  if (q.arabic && q.arabic.trim()) {
    arabicText.textContent = q.arabic;
    arabicText.style.display = 'block';
    arabicDivider.style.display = 'block';
  } else {
    arabicText.style.display = 'none';
    arabicDivider.style.display = 'none';
  }

  // English text — truncate very long hadiths for display
  let displayText = q.text;
  if (displayText.length > 600) displayText = displayText.slice(0, 600).trimEnd() + '…';
  quoteText.textContent = displayText;
  authorText.textContent = q.author ? `— ${q.author}` : '';

  // Source tag
  if (q.source) {
    sourceTagText.textContent = q.source;
    sourceTag.style.display = 'inline-flex';
  } else {
    sourceTag.style.display = 'none';
  }

  quoteContent.classList.remove('hidden');

  quoteBox.classList.remove('visible');
  requestAnimationFrame(() => requestAnimationFrame(() => quoteBox.classList.add('visible')));
}

function showError() {
  isLoading = false;
  generateBtn.disabled = false;
  loadingSpinner.classList.remove('active');
  quoteContent.classList.add('hidden');
  errorMsg.classList.add('show');
  quoteBox.classList.add('visible');
}

function generate() {
  if (isLoading) return;
  showLoading();
  // Pick a random quote, avoiding the last shown
  const all = [...QUOTES, ...EXTRA_QUOTES, ...MORE_FINAL];
  let idx;
  do { idx = Math.floor(Math.random() * all.length); } while (idx === lastIndex && all.length > 1);
  lastIndex = idx;
  // Small timeout to let loading animation show
  setTimeout(() => showQuote(all[idx]), 250);
}

// ─── Generate button & keyboard ───────────────────────────
generateBtn.addEventListener('click', () => generate());

window.addEventListener('keydown', (e) => {
  if ((e.code === 'Space' || e.code === 'Enter') && !isLoading) {
    e.preventDefault();
    generate();
  }
});

window.addEventListener('pageshow', (e) => {
  if (e.persisted) generate();
});

// First load
setTimeout(() => generate(), 400);

// ─── Canvas image builder ─────────────────────────────────
async function buildQuoteImage() {
  try {
    const fontQuote = new FontFace('Cormorant Garamond', 'url(https://fonts.gstatic.com/s/cormorantgaramond/v22/co3YmX5slCNuHLi8bLeY9MK7whWMhyjYrEPjuw.woff2)');
    const fontArabic = new FontFace('Amiri', 'url(https://fonts.gstatic.com/s/amiri/v27/J7aRnpd8CGxBHqUpvrIw74NL.woff2)');
    await Promise.all([fontQuote.load(), fontArabic.load()]);
    document.fonts.add(fontQuote);
    document.fonts.add(fontArabic);
  } catch(e) { /* fallback */ }

  const size = 1080;
  const canvas = document.createElement("canvas");
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext("2d");

  const bg = ctx.createLinearGradient(0, 0, size, size);
  bg.addColorStop(0, "#0d0d1a");
  bg.addColorStop(0.5, "#12102b");
  bg.addColorStop(1, "#0a0a18");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, size, size);

  const vignette = ctx.createRadialGradient(size/2, size/2, 100, size/2, size/2, size*0.72);
  vignette.addColorStop(0, "rgba(90, 62, 224, 0.10)");
  vignette.addColorStop(1, "rgba(0, 0, 0, 0.45)");
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, size, size);

  ctx.strokeStyle = "rgba(180, 150, 255, 0.25)";
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(size*0.22, 110); ctx.lineTo(size*0.78, 110); ctx.stroke();

  function wrapText(text, font, maxW) {
    ctx.font = font;
    const words = text.split(" ");
    let line = "", lines = [];
    for (let n = 0; n < words.length; n++) {
      const test = line + words[n] + " ";
      if (ctx.measureText(test).width > maxW && n > 0) { lines.push(line.trim()); line = words[n] + " "; }
      else { line = test; }
    }
    lines.push(line.trim());
    return lines;
  }

  const maxWidth = 840;
  ctx.textAlign = "center";

  const quote  = currentQuote.text   || '';
  const author = currentQuote.author ? `— ${currentQuote.author}` : '';
  const arabic = currentQuote.arabic || '';
  const source = currentQuote.source || '';

  // Measure everything first to center vertically
  const englishFont = "500 52px 'Cormorant Garamond', Georgia, serif";
  const arabicFont  = "400 58px 'Amiri', serif";
  const authorFont  = "italic 400 34px 'Cormorant Garamond', Georgia, serif";
  const sourceFont  = "300 26px 'Plus Jakarta Sans', sans-serif";

  let displayQuote = quote;
  if (displayQuote.length > 500) displayQuote = displayQuote.slice(0,500).trimEnd() + '…';

  const englishLines = wrapText(displayQuote, englishFont, maxWidth);
  const arabicLines  = arabic ? wrapText(arabic, arabicFont, maxWidth - 60) : [];

  const lhEn = 70, lhAr = 80;
  const arabicBlock = arabicLines.length ? (arabicLines.length * lhAr + 40) : 0;
  const dividerH    = arabicLines.length ? 30 : 0;
  const englishBlock= englishLines.length * lhEn;
  const authorH     = author ? 70 : 0;
  const sourceH     = source ? 50 : 0;
  const totalH = arabicBlock + dividerH + englishBlock + authorH + sourceH;
  let y = (size - totalH) / 2 + lhAr;

  // Arabic block
  if (arabicLines.length) {
    ctx.font = arabicFont;
    ctx.fillStyle = "rgba(230,217,255,0.9)";
    arabicLines.forEach(line => { ctx.fillText(line, size/2, y); y += lhAr; });
    y += 20;
    ctx.strokeStyle = "rgba(192,132,252,0.2)";
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(size*0.35, y); ctx.lineTo(size*0.65, y); ctx.stroke();
    y += dividerH;
  }

  // English
  ctx.font = englishFont;
  ctx.fillStyle = "#f0eaff";
  englishLines.forEach(line => { ctx.fillText(line, size/2, y); y += lhEn; });

  // Author
  if (author) {
    y += 20;
    ctx.font = authorFont;
    ctx.fillStyle = "rgba(192,158,255,0.8)";
    ctx.fillText(author, size/2, y);
    y += authorH - 20;
  }

  // Source
  if (source) {
    y += 10;
    ctx.font = sourceFont;
    ctx.fillStyle = "rgba(255,255,255,0.25)";
    ctx.fillText(source, size/2, y);
  }

  ctx.strokeStyle = "rgba(180, 150, 255, 0.25)";
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(size*0.22, size-110); ctx.lineTo(size*0.78, size-110); ctx.stroke();

  return new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
}

// ─── Share helpers ────────────────────────────────────────
function getShareText() {
  let txt = currentQuote.text || '';
  if (txt.length > 280) txt = txt.slice(0, 277) + '…';
  if (currentQuote.author) txt += ` — ${currentQuote.author}`;
  if (currentQuote.source) txt += `\n\n[${currentQuote.source}]`;
  return txt;
}

document.getElementById('shareX').addEventListener('click', () => {
  const txt = getShareText();
  if (!txt) return;
  window.open('https://x.com/intent/tweet?text=' + encodeURIComponent(txt), '_blank');
});

document.getElementById('shareTg').addEventListener('click', () => {
  const txt = getShareText();
  if (!txt) return;
  window.open('https://t.me/share/url?url=%20&text=' + encodeURIComponent(txt), '_blank');
});

document.getElementById("saveBtn").addEventListener("click", async () => {
  const blob = await buildQuoteImage();
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.download = "quote.png";
  link.href = url;
  link.click();
  URL.revokeObjectURL(url);
});
</script>
