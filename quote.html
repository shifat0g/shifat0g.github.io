let currentIndex = -1;

function getRandomIndex() {
  // Use crypto.getRandomValues for true randomness
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  let idx;
  do { idx = arr[0] % quotes.length; }
  while (idx === currentIndex && quotes.length > 1);
  return idx;
}

function getRandomQuote() {
  currentIndex = getRandomIndex();
  return quotes[currentIndex];
}

const quoteBox = document.getElementById('quoteBox');
const quoteText = document.getElementById('quoteText');
const authorText = document.getElementById('authorText');
const generateBtn = document.getElementById('generateBtn');

function showNewQuote(instant = false) {
  const { text, author } = getRandomQuote();

  if (instant) {
    quoteText.textContent = text;
    authorText.textContent = author ? `— ${author}` : '';
    quoteBox.classList.add('visible');
    return;
  }

  quoteBox.classList.remove('visible');
  setTimeout(() => {
    quoteText.textContent = text;
    authorText.textContent = author ? `— ${author}` : '';
    quoteBox.classList.add('visible');
  }, 320);
}

// First quote on load
setTimeout(() => showNewQuote(), 400);
generateBtn.addEventListener('click', () => showNewQuote());

// Re-roll when user navigates back (bfcache restore)
window.addEventListener('pageshow', (e) => {
  if (e.persisted) showNewQuote(true);
});

// Keyboard shortcut
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    showNewQuote();
  }
});

document.getElementById('shareX').addEventListener('click', () => {
  if (!currentQuote) return;
  const txt = currentQuote.author
    ? `"${currentQuote.text}" — ${currentQuote.author}`
    : `"${currentQuote.text}"`;
  window.open('https://x.com/intent/tweet?text=' + encodeURIComponent(txt), '_blank');
});

document.getElementById('shareTg').addEventListener('click', () => {
  if (!currentQuote) return;
  const txt = currentQuote.author
    ? `"${currentQuote.text}"\n— ${currentQuote.author}`
    : `"${currentQuote.text}"`;
  window.open('https://t.me/share/url?url=&text=' + encodeURIComponent(txt), '_blank');
});

document.getElementById("saveBtn").addEventListener("click", async () => {

  // Load elegant fonts via FontFace API
  try {
    const fontQuote = new FontFace(
      'Cormorant Garamond',
      'url(https://fonts.gstatic.com/s/cormorantgaramond/v22/co3YmX5slCNuHLi8bLeY9MK7whWMhyjYrEPjuw.woff2)'
    );
    const fontAuthor = new FontFace(
      'Cormorant Garamond Italic',
      'url(https://fonts.gstatic.com/s/cormorantgaramond/v22/co3WmX5slCNuHLi8bLeY9MK7whWMhyjQAllvuQ.woff2)',
      { style: 'italic', weight: '500' }
    );
    await Promise.all([fontQuote.load(), fontAuthor.load()]);
    document.fonts.add(fontQuote);
    document.fonts.add(fontAuthor);
  } catch(e) { /* fall back to serif */ }

  const size = 1080;
  const canvas = document.createElement("canvas");
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext("2d");

  // Single luxury dark background — deep midnight navy with subtle vignette
  const bg = ctx.createLinearGradient(0, 0, size, size);
  bg.addColorStop(0, "#0d0d1a");
  bg.addColorStop(0.5, "#12102b");
  bg.addColorStop(1, "#0a0a18");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, size, size);

  // Subtle radial vignette glow in center
  const vignette = ctx.createRadialGradient(size/2, size/2, 100, size/2, size/2, size*0.72);
  vignette.addColorStop(0, "rgba(90, 62, 224, 0.10)");
  vignette.addColorStop(1, "rgba(0, 0, 0, 0.45)");
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, size, size);

  // Thin decorative top line
  ctx.strokeStyle = "rgba(180, 150, 255, 0.25)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(size * 0.25, 120);
  ctx.lineTo(size * 0.75, 120);
  ctx.stroke();

  // Opening quotation mark
  ctx.fillStyle = "rgba(180, 150, 255, 0.20)";
  ctx.font = "italic 180px 'Cormorant Garamond', Georgia, serif";
  ctx.textAlign = "center";
  ctx.fillText("\u201C", size / 2, 280);

  const quote = document.getElementById("quoteText").textContent;
  const author = document.getElementById("authorText").textContent;

  // Quote text
  ctx.fillStyle = "#f0eaff";
  ctx.font = "500 58px 'Cormorant Garamond', Georgia, serif";
  ctx.textAlign = "center";

  const maxWidth = 820;
  const lineHeight = 78;

  function wrapText(text, font) {
    ctx.font = font;
    const words = text.split(" ");
    let line = "";
    const lines = [];
    for (let n = 0; n < words.length; n++) {
      const testLine = line + words[n] + " ";
      if (ctx.measureText(testLine).width > maxWidth && n > 0) {
        lines.push(line.trim());
        line = words[n] + " ";
      } else {
        line = testLine;
      }
    }
    lines.push(line.trim());
    return lines;
  }

  const quoteFont = "500 58px 'Cormorant Garamond', Georgia, serif";
  const lines = wrapText(quote, quoteFont);

  // Calculate total block height to center everything
  const authorHeight = author ? 100 : 0;
  const totalHeight = lines.length * lineHeight + authorHeight;
  let y = (size - totalHeight) / 2 + lineHeight;

  // Draw each line
  ctx.font = quoteFont;
  ctx.fillStyle = "#f0eaff";
  lines.forEach(line => {
    ctx.fillText(line, size / 2, y);
    y += lineHeight;
  });

  // Author line
  if (author) {
    y += 30;
    ctx.font = "italic 400 38px 'Cormorant Garamond', Georgia, serif";
    ctx.fillStyle = "rgba(192, 158, 255, 0.80)";
    ctx.fillText(author, size / 2, y);
  }

  // Thin decorative bottom line
  ctx.strokeStyle = "rgba(180, 150, 255, 0.25)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(size * 0.25, size - 120);
  ctx.lineTo(size * 0.75, size - 120);
  ctx.stroke();

  const link = document.createElement("a");
  link.download = "quote.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
});
