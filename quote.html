<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quotes • Daily Motivation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400&family=Cinzel+Decorative:wght@900&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #0a0a14;
      --bg2: #131327;
      --text: #e6d9ff;
      --text-muted: #b399ff;
      --accent: #c084fc;
      --accent-dark: #5a3ee0;
      --card: rgba(30, 10, 60, 0.45);
      --glow: rgba(123, 94, 255, 0.18);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      min-height: 100%;
      background: linear-gradient(135deg, #0a0a14 0%, #131327 100%);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: 
        radial-gradient(circle at 15% 30%, rgba(180,160,255,0.07) 0%, transparent 25%),
        radial-gradient(circle at 80% 70%, rgba(100,200,255,0.05) 0%, transparent 35%);
      z-index: 0;
    }

    /* Navbar */
    .site-pill-nav {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
      z-index: 9999; width: calc(100% - 2.5rem); max-width: 680px;
    }
    .site-pill-inner {
      display: flex; align-items: center; justify-content: space-between;
      height: 48px; padding: 0 1rem;
      border-radius: 100px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(22px) saturate(1.5);
      -webkit-backdrop-filter: blur(22px) saturate(1.5);
      box-shadow: 0 4px 24px rgba(0,0,0,0.35);
    }
    .site-pill-logo {
      display: flex; align-items: center; gap: 0.5rem;
      font-family: 'Cinzel Decorative', serif; font-size: 0.9rem; font-weight: 900;
      color: rgba(255,255,255,0.95); text-decoration: none;
      letter-spacing: 0.04em; text-shadow: 0 0 18px rgba(47,186,189,0.45);
      transition: opacity 0.2s;
    }
    .site-pill-logo:hover { opacity: 0.7; }
    .site-back-btn {
      display: flex; align-items: center; gap: 0.4rem;
      font-family: 'DM Mono', monospace; font-size: 0.62rem;
      letter-spacing: 0.08em; color: rgba(255,255,255,0.5);
      text-decoration: none; padding: 0.35rem 0.8rem;
      border-radius: 100px; background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      transition: background 0.2s, color 0.2s;
    }
    .site-back-btn:hover { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.9); }

    /* Main layout */
    .container {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 110px 1.5rem 2rem;
      gap: 0;
    }

    .header-block {
      text-align: center;
      margin-bottom: clamp(0.8rem, 2vh, 1.5rem);
      flex-shrink: 0;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      font-weight: 700;
      background: linear-gradient(90deg, #c0b7ff, #a78aff, #7b5eff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      line-height: 1;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: clamp(0.8rem, 2vw, 0.95rem);
      color: var(--text-muted);
      opacity: 0.85;
    }

    .quote-box {
      position: relative;
      width: min(95%, 850px);
      min-height: 260px;
      padding: clamp(1.5rem, 3vh, 2.5rem) clamp(1.2rem, 3vw, 2.5rem);
      background: var(--card);
      border-radius: 20px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(120,100,255,0.12);
      box-shadow: 0 20px 50px -15px rgba(0,0,0,0.55), 0 0 0 1px rgba(123,94,255,0.08) inset;
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      opacity: 0;
      transform: translateY(30px);
      flex-shrink: 0;
      margin-bottom: clamp(0.7rem, 1.5vh, 1.2rem);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }
    .quote-box.visible { opacity: 1; transform: translateY(0); }

    /* Loading spinner */
    .loading-spinner {
      display: none;
      width: 32px; height: 32px;
      border: 2px solid rgba(192,132,252,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: auto;
    }
    .loading-spinner.active { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .quote-content { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 0.6rem; }
    .quote-content.hidden { display: none; }

    .arabic-text {
      font-family: 'Amiri', serif;
      font-size: clamp(1.4rem, 3.5vw, 2.1rem);
      line-height: 1.8;
      text-align: center;
      direction: rtl;
      color: rgba(230,217,255,0.95);
      letter-spacing: 0.02em;
      margin-bottom: 0.3rem;
    }
    .arabic-divider {
      width: 40%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(192,132,252,0.3), transparent);
      margin: 0.2rem auto;
    }

    .quote {
      font-size: clamp(1.1rem, 2.5vw, 1.7rem);
      font-weight: 400;
      line-height: 1.55;
      text-align: center;
      letter-spacing: -0.1px;
      font-family: 'Playfair Display', serif;
      color: var(--text);
    }
    .author {
      text-align: center;
      font-size: clamp(0.72rem, 1.4vw, 0.9rem);
      font-weight: 500;
      color: var(--accent);
      opacity: 0.9;
    }
    .source-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.07em;
      color: rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 100px;
      padding: 0.25rem 0.75rem;
    }
    .source-tag-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.7;
      flex-shrink: 0;
    }

    /* Error state */
    .error-msg {
      display: none;
      text-align: center;
      font-size: 0.82rem;
      color: rgba(255,150,150,0.8);
      padding: 0.5rem;
    }
    .error-msg.show { display: block; }

    /* Actions rows */
    .actions-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      flex-shrink: 0;
    }
    .actions-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .btn {
      padding: 0.7rem 1.8rem;
      font-size: 0.9rem;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
      box-shadow: 0 8px 24px rgba(90, 62, 224, 0.3);
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 14px 36px rgba(90,62,224,0.45); }
    .btn:active { transform: translateY(0) scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Share buttons */
    .share-btn {
      display: flex; align-items: center; justify-content: center;
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.2s;
      flex-shrink: 0;
    }
    .share-btn:hover { transform: translateY(-2px); }
    .share-btn-x:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.25); color: white; }
    .share-btn-tg:hover { background: rgba(42,174,226,0.15); border-color: rgba(42,174,226,0.35); color: #40b3e0; }

    @media (max-width: 480px) {
      .quote-box { padding: 1.4rem 1.1rem; }
      h1 { font-size: clamp(2rem, 9vw, 3rem); }
      .btn { padding: 0.65rem 1.4rem; font-size: 0.82rem; }
    }

    @media (max-height: 600px) {
      .header-block { display: none; }
      .container { gap: 0.5rem; }
    }
  </style>
</head>
<body>

  <div class="stars"></div>

  <div class="site-pill-nav">
    <div class="site-pill-inner">
      <a href="https://shifat.dev/" class="site-pill-logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Crescent moon -->
          <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" fill="url(#moonGrad)" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
          <!-- Star -->
          <path d="M17.5 6.5l.5 1.5 1.5.5-1.5.5-.5 1.5-.5-1.5-1.5-.5 1.5-.5z" fill="#f9d87a"/>
          <defs>
            <linearGradient id="moonGrad" x1="3" y1="3" x2="21" y2="21" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#c084fc"/>
              <stop offset="100%" stop-color="#7c3aed"/>
            </linearGradient>
          </defs>
        </svg>
        Shifat
      </a>
      <a href="https://shifat.dev/" class="site-back-btn">← Back</a>
    </div>
  </div>

  <div class="container">
    <div class="header-block">
      <h1>Quotes</h1>
      <div class="subtitle">Wisdom from the Quran & Sunnah.</div>
    </div>

    <div class="quote-box" id="quoteBox">
      <div class="loading-spinner" id="loadingSpinner"></div>
      <div class="quote-content hidden" id="quoteContent">
        <div class="arabic-text" id="arabicText" style="display:none"></div>
        <div class="arabic-divider" id="arabicDivider" style="display:none"></div>
        <div class="quote" id="quoteText">Click generate to begin…</div>
        <div class="author" id="authorText"></div>
        <div class="source-tag" id="sourceTag" style="display:none">
          <span class="source-tag-dot"></span>
          <span id="sourceTagText"></span>
        </div>
      </div>
      <div class="error-msg" id="errorMsg">Failed to load quote. Please try again.</div>
    </div>

    <div class="actions-wrapper">
      <!-- Row 1: Generate + Save Image -->
      <div class="actions-row">
        <button class="btn" id="generateBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:6px;margin-top:-2px"><path d="M16 3h5v5M4 20l16-16M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
          Generate
        </button>
        <button class="btn" id="saveBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;margin-right:6px;margin-top:-2px"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Save Image
        </button>
      </div>

      <!-- Row 2: X + Telegram -->
      <div class="actions-row">
        <button class="share-btn share-btn-x" id="shareX" title="Share on X">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
            <path d="M13.808 10.736 20.473 3h-1.596l-5.789 6.727L8.31 3H3l7.014 10.21L3 21h1.596l6.133-7.127L15.69 21H21l-7.192-10.264Zm-2.172 2.522-.711-1.017L5.18 4.182h2.435l4.566 6.528.711 1.017 5.934 8.483h-2.435l-4.755-6.952Z"/>
          </svg>
        </button>
        <button class="share-btn share-btn-tg" id="shareTg" title="Share on Telegram">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

<script>
// ─── Quotes Data ─────────────────────────────────────────────────
const QUOTES = [
  // ─── QURAN VERSES ─────────────────────────────────────────────────────────
  { arabic: "وَإِذَا سَأَلَكَ عِبَادِي عَنِّي فَإِنِّي قَرِيبٌ", text: "And when My servants ask you concerning Me, indeed I am near.", author: "Surah Al-Baqarah (2:186)", source: "Quran" },
  { arabic: "اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ", text: "Allah — there is no deity except Him, the Ever-Living, the Sustainer of existence.", author: "Surah Al-Baqarah (2:255)", source: "Quran" },
  { arabic: "وَعَسَىٰ أَن تَكْرَهُوا شَيْئًا وَهُوَ خَيْرٌ لَّكُمْ", text: "But perhaps you hate a thing and it is good for you.", author: "Surah Al-Baqarah (2:216)", source: "Quran" },
  { arabic: "فَإِنَّ مَعَ الْعُسْرِ يُسْرًا", text: "For indeed, with hardship will be ease.", author: "Surah Ash-Sharh (94:5)", source: "Quran" },
  { arabic: "إِنَّ مَعَ الْعُسْرِ يُسْرًا", text: "Indeed, with hardship will be ease.", author: "Surah Ash-Sharh (94:6)", source: "Quran" },
  { arabic: "وَلَا تَيْأَسُوا مِن رَّوْحِ اللَّهِ", text: "And despair not of relief from Allah.", author: "Surah Yusuf (12:87)", source: "Quran" },
  { arabic: "حَسْبُنَا اللَّهُ وَنِعْمَ الْوَكِيلُ", text: "Sufficient for us is Allah, and He is the best Disposer of affairs.", author: "Surah Al-Imran (3:173)", source: "Quran" },
  { arabic: "وَاللَّهُ يُحِبُّ الصَّابِرِينَ", text: "And Allah loves the patient.", author: "Surah Al-Imran (3:146)", source: "Quran" },
  { arabic: "إِنَّ اللَّهَ مَعَ الصَّابِرِينَ", text: "Indeed, Allah is with the patient.", author: "Surah Al-Baqarah (2:153)", source: "Quran" },
  { arabic: "وَلَنَبْلُوَنَّكُم بِشَيْءٍ مِّنَ الْخَوْفِ وَالْجُوعِ", text: "And We will surely test you with something of fear and hunger and a loss of wealth and lives and fruits, but give good tidings to the patient.", author: "Surah Al-Baqarah (2:155)", source: "Quran" },
  { arabic: "إِنَّ اللَّهَ لَا يُغَيِّرُ مَا بِقَوْمٍ حَتَّىٰ يُغَيِّرُوا مَا بِأَنفُسِهِمْ", text: "Indeed, Allah will not change the condition of a people until they change what is in themselves.", author: "Surah Ar-Ra'd (13:11)", source: "Quran" },
  { arabic: "وَهُوَ مَعَكُمْ أَيْنَ مَا كُنتُمْ", text: "And He is with you wherever you are.", author: "Surah Al-Hadid (57:4)", source: "Quran" },
  { arabic: "وَمَا تَوْفِيقِي إِلَّا بِاللَّهِ", text: "And my success is not but through Allah.", author: "Surah Hud (11:88)", source: "Quran" },
  { arabic: "رَبَّنَا لَا تُزِغْ قُلُوبَنَا بَعْدَ إِذْ هَدَيْتَنَا", text: "Our Lord, let not our hearts deviate after You have guided us.", author: "Surah Al-Imran (3:8)", source: "Quran" },
  { arabic: "وَاذْكُر رَّبَّكَ إِذَا نَسِيتَ", text: "And remember your Lord when you forget.", author: "Surah Al-Kahf (18:24)", source: "Quran" },
  { arabic: "أَلَا بِذِكْرِ اللَّهِ تَطْمَئِنُّ الْقُلُوبُ", text: "Verily, in the remembrance of Allah do hearts find rest.", author: "Surah Ar-Ra'd (13:28)", source: "Quran" },
  { arabic: "وَقُل رَّبِّ زِدْنِي عِلْمًا", text: "And say: My Lord, increase me in knowledge.", author: "Surah Ta-Ha (20:114)", source: "Quran" },
  { arabic: "فَاذْكُرُونِي أَذْكُرْكُمْ", text: "So remember Me; I will remember you.", author: "Surah Al-Baqarah (2:152)", source: "Quran" },
  { arabic: "وَشَاوِرْهُمْ فِي الْأَمْرِ", text: "And consult them in the matter.", author: "Surah Al-Imran (3:159)", source: "Quran" },
